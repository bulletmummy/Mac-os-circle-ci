# ═══════════════════════════════════════════════════════════
# 🔥 CIRCLECI WINDOWS HIGH-SPECIFICATION ENGINE 🔥
# Tier Option A (xlarge) : 16 vCPUs | 64 GB RAM
# Tier Option B (2xlarge): 32 vCPUs | 128 GB RAM
# ═══════════════════════════════════════════════════════════

version: 2.1

orbs:
  win: circleci/windows@5.0.0

jobs:
  launch-highspec-windows:
    executor:
      name: win/server-2022
      # Change "2xlarge" to "xlarge" if you want to scale down to 64 GB RAM
      size: "2xlarge" 

    steps:
      # - checkout (Line removed permanently to bypass SSH key verification blocks)

      - run:
          name: Audit System CPU and Physical RAM Capacity
          shell: powershell.exe
          command: |
            Write-Host "===================================================="
            Write-Host "Checking Allocated Compute Specifications..."
            Write-Host "===================================================="
            
            # Fetch total core count
            $Cores = (Get-WmiObject -Class Win32_Processor).NumberOfCores
            Write-Host "Allocated CPU Cores: $Cores vCPUs"
            
            # Fetch physical memory allocations mapped directly from the hypervisor
            $TotalMemory = (Get-CimInstance Win32_PhysicalMemory -ErrorAction SilentlyContinue | Measure-Object -Property Capacity -Sum).Sum
            if (!$TotalMemory) {
                $TotalMemory = (Get-WmiObject -Class Win32_ComputerSystem).TotalPhysicalMemory
            }
            $RAMInGB = [Math]::Round($TotalMemory / 1GB)
            Write-Host "Allocated Memory: $RAMInGB GB of RAM"
            Write-Host "===================================================="

      - run:
          name: High-Performance Infrastructure Keepalive
          no_output_timeout: 45m
          shell: powershell.exe
          command: |
            Write-Host "System execution window successfully initiated."
            
            # Custom automated scripts or environment configurations go here
            
            $Timer = 0
            # Loops safely to hold the high-tier instance active before the time cap finishes
            while ($Timer -lt 11) {
                Write-Host "[$(Get-Date)] High-Tier Infrastructure Run State: Normal..."
                Start-Sleep -Seconds 300
                $Timer++
            }
            Write-Host "Pipeline execution sequence complete."

workflows:
  version: 2
  run-highspec-pipeline:
    jobs:
      - launch-highspec-windows
