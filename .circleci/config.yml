# ═══════════════════════════════════════════════════════════
# 🔥 CIRCLECI WINDOWS 32 GB RAM EXECUTION ENGINE 🔥
# Architecture: Windows Server 2022 | 8 vCPUs | 32 GB RAM
# ═══════════════════════════════════════════════════════════

version: 2.1

# Import the official Windows environment controller
orbs:
  win: circleci/windows@5.0.0

jobs:
  launch-windows-sandbox:
    # Use the pre-configured Windows executor from the orb
    executor:
      name: win/server-2022
      # 'large' assigns 8 vCPUs and exactly 32 GB RAM (Costs 120 credits/min)
      size: "large"

    steps:
      - checkout  # Pulls your repository files into the environment

      - run:
          name: Verify Windows System Specifications
          shell: powershell.exe
          command: |
            Write-Host "=== WINDOWS OS DETAILS ==="
            Get-ComputerInfo | Select-Object OsName, OsVersion, OsArchitecture
            
            Write-Host "=== HARDWARE TOTAL MEMORY ==="
            $TargetRAM = (Get-CimInstance Win32_PhysicalMemory | Measure-Object -Property Capacity -Sum).Sum
            if (!$TargetRAM) {
                # Fallback if virtual hardware abstracts raw chips
                $TargetRAM = (Get-WmiObject -Class Win32_ComputerSystem).TotalPhysicalMemory
            }
            [Math]::Round($TargetRAM / 1GB) | Out-String -Stream | ForEach-Object { Write-Host "$_ GB of RAM Installed" }

      - run:
          name: Set Up Dependencies (Chocolatey / OpenSSH)
          shell: powershell.exe
          command: |
            Write-Host "Setting up networking components..."
            # Windows executors have Chocolatey pre-installed to pull tools instantly
            # choco install -y git curl

      - run:
          name: Execution Keep-Alive Engine
          no_output_timeout: 30m
          shell: powershell.exe
          command: |
            Write-Host "Windows Core System Listening and Online..."
            $Stopwatch = 0
            # Free tier runs for a maximum of 60 minutes (1 hour) before timing out
            while ($Stopwatch -lt 11) {
                Write-Host "[$(Get-Date)] Keep-Alive Heartbeat Active..."
                Start-Sleep -Seconds 300
                $Stopwatch++
            }

workflows:
  version: 2
  run-windows-pipeline:
    jobs:
      - launch-windows-sandbox
